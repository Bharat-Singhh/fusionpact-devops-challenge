server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index Devops_Intern.html;        # ← just change this line

    location / {
        try_files $uri $uri/ /Devops_Intern.html;
    }

    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}